worker_processes auto;

error_log /dev/stderr notice;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include mime.types;

    default_type application/octet-stream;

    access_log /dev/stdout;

    sendfile on;

    keepalive_timeout 65;

    # =========================================================
    # Dynamic backend variable
    # =========================================================
    #
    # Contoh:
    #
    # local-laptop-3000.jefripunza.com
    #                         │
    #                         ▼
    #                      port = 3000
    #                         │
    #                         ▼
    # http://192.168.1.4:3000
    #
    set_by_lua_block $dynamic_backend {
        local host = ngx.var.host

        -- Hilangkan port jika request datang dengan Host:port
        host = string.match(host, "^([^:]+)") or host

        -- Ambil angka dari:
        -- local-laptop-3000.jefripunza.com
        local port = string.match(
            host,
            "^local%-laptop%-(%d+)%.jefripunza%.com$"
        )

        if not port then
            ngx.log(
                ngx.ERR,
                "Invalid hostname: ",
                host
            )

            return ""
        end

        port = tonumber(port)

        -- Validasi port TCP
        if not port or port < 1 or port > 65535 then
            ngx.log(
                ngx.ERR,
                "Invalid port: ",
                tostring(port)
            )

            return ""
        end

        local backend =
            "http://192.168.1.4:" .. port

        ngx.log(
            ngx.NOTICE,
            "Dynamic proxy: ",
            host,
            " -> ",
            backend
        )

        return backend
    }

    # =========================================================
    # Dynamic Reverse Proxy
    # =========================================================

    server {
        listen 8080;

        server_name
            ~^local-laptop-[0-9]+\.jefripunza\.com$;

        # =====================================================
        # Security / validation
        # =====================================================

        if ($dynamic_backend = "") {
            return 400 "Invalid local laptop hostname\n";
        }

        # =====================================================
        # Proxy Headers
        # =====================================================

        proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For
            $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto
            $scheme;

        proxy_set_header X-Forwarded-Host
            $host;

        # =====================================================
        # WebSocket
        # =====================================================

        proxy_set_header Upgrade $http_upgrade;

        proxy_set_header Connection "upgrade";

        # =====================================================
        # Dynamic Proxy
        # =====================================================

        proxy_pass $dynamic_backend$request_uri;

        # =====================================================
        # Timeouts
        # =====================================================

        proxy_connect_timeout 10s;

        proxy_send_timeout 3600s;

        proxy_read_timeout 3600s;

        # =====================================================
        # Streaming / SSE
        # =====================================================

        proxy_buffering off;

        proxy_cache off;

        # =====================================================
        # Large Request / Upload
        # =====================================================

        client_max_body_size 0;

        # =====================================================
        # Error Handling
        # =====================================================

        proxy_intercept_errors off;
    }
}
