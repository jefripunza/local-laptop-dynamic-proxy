worker_processes auto;

error_log /dev/stderr notice;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include mime.types;

    default_type application/octet-stream;

    access_log /dev/stdout;

    sendfile on;

    keepalive_timeout 65;

    server {
        listen 8080;

        server_name ~^local-laptop-[0-9]+\.jefripunza\.com$;

        # Variable backend
        set $dynamic_backend "";

        # =====================================================
        # Extract port dari hostname
        #
        # local-laptop-4000.jefripunza.com
        #                    │
        #                    ▼
        #                   4000
        #                    │
        #                    ▼
        # http://192.168.1.4:4000
        # =====================================================

        access_by_lua_block {
            local host = ngx.var.host

            -- Extract port dari hostname
            local port = string.match(
                host,
                "^local%-laptop%-(%d+)%.jefripunza%.com$"
            )

            if not port then
                ngx.log(
                    ngx.ERR,
                    "Invalid hostname: ",
                    host
                )

                return ngx.exit(
                    ngx.HTTP_BAD_REQUEST
                )
            end

            port = tonumber(port)

            -- Validasi port
            if not port or port < 1 or port > 65535 then
                ngx.log(
                    ngx.ERR,
                    "Invalid port: ",
                    tostring(port)
                )

                return ngx.exit(
                    ngx.HTTP_BAD_REQUEST
                )
            end

            -- Set backend
            ngx.var.dynamic_backend =
                "http://192.168.1.4:" .. port

            ngx.log(
                ngx.NOTICE,
                "Dynamic proxy: ",
                host,
                " -> ",
                ngx.var.dynamic_backend
            )
        }

        # =====================================================
        # Reverse Proxy
        # =====================================================

        location / {

            proxy_http_version 1.1;

            # Original Host
            proxy_set_header Host $host;

            # Client IP
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For
                $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto
                $scheme;

            proxy_set_header X-Forwarded-Host
                $host;

            # =================================================
            # WebSocket
            # =================================================

            proxy_set_header Upgrade $http_upgrade;

            proxy_set_header Connection "upgrade";

            # =================================================
            # Dynamic Backend
            # =================================================

            proxy_pass $dynamic_backend$request_uri;

            # =================================================
            # Timeout
            # =================================================

            proxy_connect_timeout 10s;

            proxy_send_timeout 3600s;

            proxy_read_timeout 3600s;

            # =================================================
            # Streaming / SSE
            # =================================================

            proxy_buffering off;

            proxy_cache off;

            # =================================================
            # Upload
            # =================================================

            client_max_body_size 0;

            # =================================================
            # Error
            # =================================================

            proxy_intercept_errors off;
        }
    }
}